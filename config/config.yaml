  - name: "质量问题_商品质量处理"
    url: "https://help.jd.com/user/issue/118-453.html"

  - name: "运费规则_售后运费说明"
    url: "https://help.jd.com/user/issue/131-496.html"

  - name: "维修服务_保外检测维修"
    url: "https://help.jd.com/user/issue/321-4508.html"

  - name: "质保服务_一年质保说明"
